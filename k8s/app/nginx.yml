apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: produccion
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head><title>FleetOps Lab</title></head>
    <body>
      <h1>K3s Lab — Frontend Nginx</h1>
      <p>Cluster activo. Namespace: produccion.</p>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: produccion
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: html
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: produccion
spec:
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
